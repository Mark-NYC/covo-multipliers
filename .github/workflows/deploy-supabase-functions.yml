name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref mryjrvinzbxebzvxtggi
          supabase functions deploy register --no-verify-jwt
          supabase functions deploy immersion-apply --no-verify-jwt
          supabase functions deploy contact --no-verify-jwt
          supabase functions deploy assessment-start --no-verify-jwt
          supabase functions deploy whatsapp-request --no-verify-jwt
          supabase functions deploy subscribe-updates --no-verify-jwt
          supabase functions deploy attendance-admin --no-verify-jwt
          supabase functions deploy analytics-admin --no-verify-jwt
          supabase functions deploy ga4-admin --no-verify-jwt
          supabase functions deploy youtube-admin --no-verify-jwt
          supabase functions deploy send-lost-to-leader-reminder --no-verify-jwt
          supabase functions deploy join-whatsapp --no-verify-jwt
          supabase functions deploy lab-calendar --no-verify-jwt
          supabase functions deploy get-zoom-link --no-verify-jwt
          supabase functions deploy lab-admin
          supabase functions deploy send-lab-reminders --no-verify-jwt
