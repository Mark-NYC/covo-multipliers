<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DXGLXDTF9V"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      gtag('config', 'G-DXGLXDTF9V');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create short links from your long URLs with UTM parameters. Perfect for tracking campaigns and sharing.">
    <title>Shortlink Maker — Covo Multipliers</title>
    <link rel="icon" type="image/x-icon" href="/image/favicons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/image/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/image/favicons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/image/favicons/apple-touch-icon.png">
    <link rel="manifest" href="/image/favicons/site.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <link rel="canonical" href="https://covomultipliers.com/shortlink-maker.html">

    <style>
        /* ==============================================
           Shortlink Maker page styles
        ============================================== */

        .site-header {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-header .brand {
            font-size: 0.95rem;
            font-weight: 900;
            color: #10281f;
            text-decoration: none;
            letter-spacing: -0.01em;
        }

        .site-header .back-link {
            font-size: 0.875rem;
            color: #5a6b65;
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .site-header .back-link:hover {
            color: #1b4d3e;
        }

        /* Hero section */
        .shortlink-hero {
            padding: 3.5rem 2rem 3rem;
            background: linear-gradient(135deg,
                #10281f 0%,
                #1b4d3e 28%,
                #2c6b5d 56%,
                #9f7a2f 82%,
                #dcb55a 100%
            );
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .shortlink-hero::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.12;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12) 0.7px, transparent 0.8px),
                radial-gradient(circle at 80% 30%, rgba(0,0,0,0.10) 0.7px, transparent 0.8px),
                radial-gradient(circle at 40% 70%, rgba(255,255,255,0.08) 0.6px, transparent 0.7px),
                radial-gradient(circle at 70% 80%, rgba(0,0,0,0.08) 0.6px, transparent 0.7px);
        }

        .shortlink-hero-inner {
            position: relative;
            max-width: 580px;
            margin: 0 auto;
        }

        .shortlink-hero h1 {
            font-size: 2rem;
            font-weight: 900;
            color: #ffffff;
            margin: 0 0 0.5rem 0;
            line-height: 1.2;
        }

        .shortlink-hero p {
            font-size: 1rem;
            color: #d4d9d7;
            margin: 0;
            line-height: 1.5;
        }

        /* Main container */
        .shortlink-container {
            max-width: 650px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* Form section */
        .shortlink-form {
            background: #f9faf9;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #10281f;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: #2c6b5d;
            box-shadow: 0 0 0 3px rgba(44, 107, 93, 0.1);
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        /* Step headings */
        .step-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #5a6b65;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
        }

        .step-heading {
            font-size: 1.2rem;
            font-weight: 800;
            color: #10281f;
            margin-bottom: 1rem;
        }

        .step-heading .step-optional {
            font-weight: 500;
            color: #9ca3af;
            font-size: 0.85rem;
        }

        /* UTM quick-pick chips */
        .utm-chip-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.6rem;
        }

        .utm-chip {
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
            border: 1.5px solid #d1d5db;
            background: #ffffff;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            color: #5a6b65;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .utm-chip:hover {
            border-color: #2c6b5d;
            color: #1b4d3e;
        }

        .utm-chip.active {
            background: #1b4d3e;
            border-color: #1b4d3e;
            color: #ffffff;
        }

        .form-label .optional-tag {
            font-weight: 400;
            color: #9ca3af;
            text-transform: none;
        }

        /* Result section */
        .shortlink-result {
            background: #f0f9f7;
            border: 1px solid #b3d9d0;
            border-radius: 12px;
            padding: 2rem;
            display: none;
        }

        .shortlink-result.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #5a6b65;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .result-content {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .result-link-container {
            flex: 1;
        }

        .result-link {
            display: block;
            padding: 0.75rem 1rem;
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #1b4d3e;
            text-decoration: none;
            word-break: break-all;
            font-weight: 500;
        }

        .result-link:hover {
            background: #f0f9f7;
        }

        #copyBtn.copied,
        #utmCopyBtn.copied {
            background: #059669;
            border-color: #059669;
            color: #ffffff;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .result-info {
            font-size: 0.875rem;
            color: #5a6b65;
            line-height: 1.5;
        }

        .result-info strong {
            color: #10281f;
        }

        /* Loading state */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error message */
        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
            font-size: 0.875rem;
        }

        .error-message.show {
            display: block;
        }

        /* Success toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #10281f;
            color: #ffffff;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-size: 0.875rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease, slideOut 0.3s ease 2.7s forwards;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .shortlink-hero h1 {
                font-size: 1.5rem;
            }

            .shortlink-container {
                padding: 2rem 1rem;
            }

            .shortlink-form,
            .shortlink-result {
                padding: 1.5rem;
            }

            .result-content {
                flex-direction: column;
            }

            .toast {
                left: 1rem;
                right: 1rem;
                bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="/" class="brand">Covo Multipliers</a>
        <a href="/" class="back-link">← Back</a>
    </header>

    <section class="shortlink-hero">
        <div class="shortlink-hero-inner">
            <h1>Shortlink Maker</h1>
            <p>Build a UTM-tagged link, then shorten it. Perfect for tracking campaigns and sharing.</p>
        </div>
    </section>

    <div class="shortlink-container">

        <div class="step-label">Step 1</div>
        <h2 class="step-heading">Build a UTM Link</h2>
        <div class="shortlink-form" id="utmBuilderForm">
            <div class="form-group">
                <label class="form-label" for="utmBaseUrl">Base URL</label>
                <input
                    type="url"
                    id="utmBaseUrl"
                    class="form-input"
                    placeholder="https://covomultipliers.com/vision"
                    autocomplete="off"
                />
            </div>

            <div class="form-group">
                <label class="form-label" for="utmSource">Source</label>
                <input type="text" id="utmSource" class="form-input" placeholder="e.g. substack" autocomplete="off" />
                <div class="utm-chip-row">
                    <button type="button" class="utm-chip" data-target="utmSource" data-value="substack">Substack</button>
                    <button type="button" class="utm-chip" data-target="utmSource" data-value="youtube">YouTube</button>
                    <button type="button" class="utm-chip" data-target="utmSource" data-value="podcast">Podcast</button>
                    <button type="button" class="utm-chip" data-target="utmSource" data-value="email">Email</button>
                    <button type="button" class="utm-chip" data-target="utmSource" data-value="whatsapp">WhatsApp</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="utmMedium">Medium</label>
                <input type="text" id="utmMedium" class="form-input" placeholder="e.g. referral" autocomplete="off" />
                <div class="utm-chip-row">
                    <button type="button" class="utm-chip" data-target="utmMedium" data-value="referral">Referral</button>
                    <button type="button" class="utm-chip" data-target="utmMedium" data-value="social">Social</button>
                    <button type="button" class="utm-chip" data-target="utmMedium" data-value="cta">CTA</button>
                    <button type="button" class="utm-chip" data-target="utmMedium" data-value="email">Email</button>
                    <button type="button" class="utm-chip" data-target="utmMedium" data-value="organic">Organic</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="utmCampaign">Campaign</label>
                <input type="text" id="utmCampaign" class="form-input" placeholder="e.g. why-just-make-disciples-isnt-enough" autocomplete="off" />
            </div>

            <div class="form-group">
                <label class="form-label" for="utmContent"><span class="optional-tag">(optional)</span> Content</label>
                <input type="text" id="utmContent" class="form-input" placeholder="e.g. header-link vs. footer-link" autocomplete="off" />
            </div>

            <div class="result-label">Your UTM Link</div>
            <div class="result-content">
                <div class="result-link-container">
                    <a href="#" class="result-link" id="utmOutputLink" target="_blank" rel="noopener" style="color:#9ca3af">Enter a base URL above to get started</a>
                </div>
                <button type="button" class="btn btn-secondary" id="utmCopyBtn" disabled>Copy</button>
            </div>
        </div>

        <div class="step-label">Step 2</div>
        <h2 class="step-heading">Shorten It <span class="step-optional">(optional)</span></h2>
        <form class="shortlink-form" id="shortlinkForm">
            <div class="form-group">
                <label class="form-label" for="longUrl">Long URL with UTM Parameters</label>
                <input
                    type="url"
                    id="longUrl"
                    class="form-input"
                    placeholder="https://example.com?utm_source=email&utm_medium=campaign"
                    required
                    autocomplete="off"
                />
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;" id="generateBtn">
                <span id="btnText">Generate Shortlink</span>
            </button>

            <div class="error-message" id="errorMessage"></div>
        </form>

        <div class="shortlink-result" id="result">
            <div class="result-label">Your Short Link</div>
            <div class="result-content">
                <div class="result-link-container">
                    <a href="#" class="result-link" id="shortLink" target="_blank"></a>
                </div>
                <button type="button" class="btn btn-primary" id="copyBtn">Copy</button>
            </div>
            <div class="result-info">
                <strong>Original URL:</strong><br/>
                <span id="originalUrl"></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        console.log('[DEBUG] Script loaded');

        // Use a namespace to avoid conflicts
        window.shortlinkApp = window.shortlinkApp || {};

        async function initSupabase() {
            console.log('[DEBUG] initSupabase called');

            // Create client from the Supabase library
            const { createClient } = window.supabase;
            if (!createClient) {
                console.error('[ERROR] Supabase createClient not available');
                return null;
            }

            console.log('[DEBUG] Creating Supabase client...');
            try {
                window.shortlinkApp.client = createClient(
                    'https://mryjrvinzbxebzvxtggi.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeWpydmluemJ4ZWJ6dnh0Z2dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzQ3MzksImV4cCI6MjA5MTg1MDczOX0.U1JJQTBVKePsVFXr2oFRCdUZasWaZiTQg6g8QrFdRyw'
                );
                console.log('[DEBUG] Supabase client created successfully');
                return window.shortlinkApp.client;
            } catch (err) {
                console.error('[ERROR] Failed to create client:', err);
                return null;
            }
        }

        // Initialize on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initSupabase);
        } else {
            initSupabase();
        }

        const form = document.getElementById('shortlinkForm');
        const longUrlInput = document.getElementById('longUrl');
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const errorMessage = document.getElementById('errorMessage');
        const result = document.getElementById('result');
        const shortLink = document.getElementById('shortLink');
        const originalUrl = document.getElementById('originalUrl');
        const copyBtn = document.getElementById('copyBtn');

        function generateShortCode() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('[DEBUG] Form submitted');
            console.log('[DEBUG] Supabase client available?', !!window.shortlinkApp.client);

            errorMessage.classList.remove('show');
            errorMessage.textContent = '';

            const longUrl = longUrlInput.value.trim();

            if (!longUrl) {
                console.warn('[WARN] No URL entered');
                showError('Please enter a URL');
                return;
            }

            // Validate URL
            try {
                new URL(longUrl);
                console.log('[DEBUG] URL is valid:', longUrl);
            } catch {
                console.error('[ERROR] Invalid URL:', longUrl);
                showError('Invalid URL format');
                return;
            }

            generateBtn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span>';

            try {
                console.log('[DEBUG] Starting shortlink creation...');

                const client = window.shortlinkApp.client;
                if (!client) {
                    throw new Error('Supabase client not initialized');
                }

                // Generate unique short code
                let shortCode = '';
                let attempts = 0;
                const maxAttempts = 10;

                console.log('[DEBUG] Generating unique short code...');

                while (attempts < maxAttempts) {
                    shortCode = generateShortCode();
                    console.log(`[DEBUG] Attempt ${attempts + 1}: checking code ${shortCode}`);

                    const { data: existing, error: checkError } = await client
                        .from('shortlinks')
                        .select('short_code')
                        .eq('short_code', shortCode)
                        .limit(1);

                    if (checkError) {
                        console.error('[ERROR] Check error:', checkError);
                        throw checkError;
                    }

                    console.log('[DEBUG] Query result:', existing);

                    if (!existing || existing.length === 0) {
                        console.log('[DEBUG] Found unique code:', shortCode);
                        break;
                    }
                    attempts++;
                }

                if (attempts >= maxAttempts) {
                    throw new Error('Failed to generate unique short code');
                }

                console.log('[DEBUG] Inserting shortlink with code:', shortCode);

                // Insert shortlink
                const { data, error } = await client
                    .from('shortlinks')
                    .insert({
                        short_code: shortCode,
                        long_url: longUrl,
                        metadata: {
                            user_agent: navigator.userAgent,
                            created_from: 'shortlink-maker',
                        },
                    })
                    .select()
                    .single();

                if (error) {
                    console.error('Insert error:', error);
                    console.error('Error details:', JSON.stringify(error, null, 2));
                    throw new Error(`Database error: ${error.message}`);
                }

                console.log('Insert successful:', data);

                const baseDomain = 'https://covomultipliers.com';
                const shortUrl = `${baseDomain}/s/${data.short_code}`;

                // Display result
                shortLink.href = shortUrl;
                shortLink.textContent = shortUrl;
                originalUrl.textContent = data.long_url;
                result.classList.add('show');

                // Scroll to result
                result.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } catch (err) {
                console.error('Error:', err);
                showError(err.message || 'An error occurred');
            } finally {
                generateBtn.disabled = false;
                btnText.textContent = 'Generate Shortlink';
            }
        });

        copyBtn.addEventListener('click', () => {
            const shortUrl = shortLink.textContent;
            navigator.clipboard.writeText(shortUrl).then(() => {
                showToast('Copied to clipboard!');
                copyBtn.classList.add('copied');
                copyBtn.textContent = '✓ Copied';
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.textContent = 'Copy';
                }, 2000);
            }).catch(() => {
                showError('Failed to copy to clipboard');
            });
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ============================================================
        // UTM Link Builder (Step 1) — separate from the shortener above.
        // Builds a tagged URL live as you type/click; paste the result
        // into the shortener below if you want a short version too.
        // ============================================================
        (function () {
            const baseUrlInput  = document.getElementById('utmBaseUrl');
            const sourceInput   = document.getElementById('utmSource');
            const mediumInput   = document.getElementById('utmMedium');
            const campaignInput = document.getElementById('utmCampaign');
            const contentInput  = document.getElementById('utmContent');
            const outputLink    = document.getElementById('utmOutputLink');
            const utmCopyBtn    = document.getElementById('utmCopyBtn');

            function buildUtmUrl() {
                const base = baseUrlInput.value.trim();
                if (!base) return null;
                let url;
                try {
                    url = new URL(base);
                } catch {
                    return 'invalid';
                }
                const params = {
                    utm_source: sourceInput.value.trim(),
                    utm_medium: mediumInput.value.trim(),
                    utm_campaign: campaignInput.value.trim(),
                    utm_content: contentInput.value.trim(),
                };
                Object.keys(params).forEach((key) => {
                    if (params[key]) url.searchParams.set(key, params[key]);
                });
                return url.toString();
            }

            function renderUtmOutput() {
                const built = buildUtmUrl();
                if (built === null) {
                    outputLink.textContent = 'Enter a base URL above to get started';
                    outputLink.removeAttribute('href');
                    outputLink.style.color = '#9ca3af';
                    utmCopyBtn.disabled = true;
                } else if (built === 'invalid') {
                    outputLink.textContent = 'Enter a valid URL (starting with https://)';
                    outputLink.removeAttribute('href');
                    outputLink.style.color = '#dc2626';
                    utmCopyBtn.disabled = true;
                } else {
                    outputLink.textContent = built;
                    outputLink.href = built;
                    outputLink.style.color = '#1b4d3e';
                    utmCopyBtn.disabled = false;
                }
            }

            [baseUrlInput, sourceInput, mediumInput, campaignInput, contentInput].forEach((el) => {
                el.addEventListener('input', renderUtmOutput);
            });

            document.querySelectorAll('.utm-chip').forEach((chip) => {
                chip.addEventListener('click', () => {
                    const target = document.getElementById(chip.dataset.target);
                    target.value = chip.dataset.value;
                    chip.parentElement.querySelectorAll('.utm-chip').forEach((c) => {
                        c.classList.toggle('active', c === chip);
                    });
                    renderUtmOutput();
                });
            });

            // Keep chip highlighting in sync if the field is hand-edited.
            [sourceInput, mediumInput].forEach((input) => {
                input.addEventListener('input', () => {
                    const row = input.closest('.form-group').querySelector('.utm-chip-row');
                    if (!row) return;
                    row.querySelectorAll('.utm-chip').forEach((c) => {
                        c.classList.toggle('active', c.dataset.value === input.value.trim());
                    });
                });
            });

            utmCopyBtn.addEventListener('click', () => {
                const text = outputLink.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Copied to clipboard!');
                    utmCopyBtn.classList.add('copied');
                    utmCopyBtn.textContent = '✓ Copied';
                    setTimeout(() => {
                        utmCopyBtn.classList.remove('copied');
                        utmCopyBtn.textContent = 'Copy';
                    }, 2000);
                }).catch(() => {
                    showToast('Could not copy — copy the link manually');
                });
            });

            renderUtmOutput();
        })();
    </script>
</body>
</html>
