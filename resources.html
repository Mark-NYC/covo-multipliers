<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Resources — Covo Multipliers">
    <title>Resources — Covo Multipliers</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .coming-soon-section {
            min-height: calc(100vh - 0px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem;
            background: #ffffff;
            text-align: center;
        }

        .coming-soon-inner {
            max-width: 560px;
        }

        .coming-soon-accent {
            display: block;
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #1b4d3e, #dcb55a);
            border-radius: 2px;
            margin: 0 auto 1.5rem;
        }

        .coming-soon-title {
            font-size: clamp(2rem, 5vw, 3.25rem);
            font-weight: 900;
            color: #10281f;
            letter-spacing: -0.025em;
            line-height: 1.1;
            margin-bottom: 1.25rem;
        }

        .coming-soon-message {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1b4d3e;
            margin-bottom: 1rem;
            letter-spacing: 0.01em;
        }

        .coming-soon-body {
            font-size: 1rem;
            color: #5a6b65;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
    </style>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

    <section class="coming-soon-section">
        <div class="coming-soon-inner">
            <span class="coming-soon-accent"></span>
            <h1 class="coming-soon-title">Resources</h1>
            <p class="coming-soon-message">Coming soon.</p>
            <p class="coming-soon-body">We're building this page now and will be adding practical tools, recommended links, and training resources here.</p>
            <a class="btn-pill" href="/">← Back to Home</a>
        </div>
    </section>

</body>
</html>
